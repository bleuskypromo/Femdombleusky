name: FemdomBleusky Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "18 * * * *"

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install atproto

      - name: Run bot
        env:
          BSKY_USERNAME: ${{ secrets.BSKY_USERNAME_FEMDOM }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD_FEMDOM }}

          STATE_FILE: "state_femdombleusky.json"

          LIST_MEMBER_LIMIT: "1500"
          MAX_PER_RUN: "100"
          MAX_PER_USER: "3"
          HOURS_BACK: "3"
          SLEEP_SECONDS: "2"

          AUTHOR_POSTS_PER_MEMBER: "30"
          FEED_MAX_ITEMS: "500"
          HASHTAG_MAX_ITEMS: "100"
        run: |
          python -u femdombleusky_reposter.py

      - name: Commit state if changed
        run: |
          if git status --porcelain | grep -qE "state_femdombleusky\.json"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state_femdombleusky.json
            git commit -m "Update femdombleusky state"
            git push
          else
            echo "No state changes to commit."
          fi
